<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entrar — Bíko</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages/auth.css" />
  </head>
  <body class="auth-page">
    <header class="header">
      <nav class="nav container">
        <a href="index.html" class="nav__logo" aria-label="Bíko — Home">
          <img src="logo.svg" alt="Bíko" />
        </a>
      </nav>
    </header>

    <main class="auth-main">
      <section class="auth-card">
        <h1 class="auth-card__title">Bem-vindo de volta</h1>
        <p class="auth-card__subtitle">Entre na sua conta Bíko</p>

        
        
        <div class="feedback" id="feedback" role="alert" aria-live="polite"></div>

        <form class="form" id="loginForm" novalidate>
          
          <div class="form__group">
            <label class="form__label" for="email">E-mail</label>
            <input
              class="form__input"
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              autocomplete="email"
              required
            />
            <span class="form__error" id="emailError"></span>
          </div>

          
          <div class="form__group">
            <label class="form__label" for="senha">Senha</label>
            <div class="form__input-wrap">
              <input
                class="form__input"
                type="password"
                id="senha"
                name="senha"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="form__toggle-password" data-target="senha" aria-label="Mostrar senha"></button>
            </div>
            <span class="form__error" id="senhaError"></span>
          </div>

          <button type="submit" class="btn btn--primary btn--full" id="submitBtn">
            Entrar
          </button>
        </form>

        <p class="auth-card__footer">
          Não tem conta?
          <a href="cadastro-cliente.html">Cadastre-se como cliente</a>
          ou
          <a href="cadastro-profissional.html">como profissional</a>
        </p>
      </section>
    </main>

    <footer class="footer footer--minimal">
      <div class="container">
        <p class="footer__copy">&copy; 2026 Bíko. Todos os direitos reservados. &nbsp;·  <a href="index.html">Voltar ao início</a></p>
      </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/validation.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/nav.js"></script>
  </body>
</html>
